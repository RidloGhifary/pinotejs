<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinote - Vanilla Demo</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      .card {
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      button {
        padding: 10px 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Pinote Vanilla Demo</h1>
    <p>This page uses the framework-agnostic <code>pinote</code> directly.</p>

    <div class="card" data-comment-anchor="demo-card-1">
      <h2>Card 1</h2>
      <p>
        Click me to leave a comment. I have a stable
        <code>data-comment-anchor</code> attribute.
      </p>
      <button>Action</button>
    </div>

    <div class="card">
      <h2>Card 2</h2>
      <p>
        I don't have an anchor attribute, so the core will generate a CSS selector
        for me.
      </p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
